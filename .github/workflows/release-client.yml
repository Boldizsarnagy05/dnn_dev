name: Release Client App

on:
  push:
    branches: [main]
    paths:
      - 'Kliensalk/WinFormsApp/**'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release verzió (pl. 1.1.0)'
        required: true
        default: '1.1.0'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet packages
        working-directory: Kliensalk/WinFormsApp
        run: nuget restore WinFormsApp.sln

      - name: Build Release
        working-directory: Kliensalk/WinFormsApp
        run: msbuild WinFormsApp.sln /p:Configuration=Release /p:Platform="Any CPU"

      - name: Create ZIP (without .pdb)
        shell: pwsh
        run: |
          $files = Get-ChildItem "Kliensalk/WinFormsApp/bin/Release/net48" -Exclude "*.pdb"
          Compress-Archive -Path $files.FullName -DestinationPath "dl/NaturaCo.RecipeEditor.zip" -Force

      - name: Commit updated ZIP to main
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dl/NaturaCo.RecipeEditor.zip
          git commit -m "Build: kliens ZIP frissítve (automatikus build)"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/Boldizsarnagy05/dnn_dev.git main

      - name: Determine version tag
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            echo "tag=v${{ github.event.inputs.version }}" >> $env:GITHUB_OUTPUT
            echo "name=NaturaCo Recipe Editor v${{ github.event.inputs.version }}" >> $env:GITHUB_OUTPUT
          } else {
            $date = Get-Date -Format "yyyy.MM.dd"
            $sha  = "${{ github.sha }}".Substring(0, 7)
            echo "tag=v$date-$sha" >> $env:GITHUB_OUTPUT
            echo "name=NaturaCo Recipe Editor $date ($sha)" >> $env:GITHUB_OUTPUT
          }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.name }}
          body: |
            ## NaturaCo Recipe Editor

            Töltsd le a `NaturaCo.RecipeEditor.zip` fájlt, csomagold ki, majd futtasd a `NaturaCo.RecipeEditor.exe` programot.

            **Rendszerkövetelmény:** Windows, .NET Framework 4.8
          files: dl/NaturaCo.RecipeEditor.zip
          draft: false
          prerelease: false
